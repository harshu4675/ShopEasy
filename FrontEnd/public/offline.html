<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline - Talish Clothes</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 100%);
        padding: 20px;
      }
      .container {
        text-align: center;
        max-width: 400px;
      }
      .icon {
        font-size: 80px;
        margin-bottom: 20px;
      }
      h1 {
        color: #831843;
        font-size: 28px;
        margin-bottom: 12px;
      }
      p {
        color: #6b7280;
        margin-bottom: 24px;
        line-height: 1.6;
      }
      button {
        background: linear-gradient(135deg, #831843, #ec4899);
        color: white;
        border: none;
        padding: 12px 32px;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(131, 24, 67, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>You're Offline</h1>
      <p>Please check your internet connection and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
