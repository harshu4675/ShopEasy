<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#e91e63" />

    <!-- Primary Meta Tags -->
    <meta
      name="title"
      content="ShopEasy - Online Fashion Store | Clothing, Accessories, Perfumes & More"
    />
    <meta
      name="description"
      content="Shop the latest trends at ShopEasy! Discover men's & women's clothing, accessories, watches, perfumes, bags, jewelry and footwear. Free delivery on orders above ₹199. COD available. Easy returns within 7 days."
    />
    <meta
      name="keywords"
      content="online shopping india, fashion store, clothing online, mens clothing, womens clothing, kids wear, accessories, watches, perfumes, bags, jewelry, footwear, online shopping with cod, free delivery"
    />
    <meta name="author" content="ShopEasy" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />

    <!-- Open Graph / Facebook Meta Tags -->
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://shopeasy-fashionstore.netlify.app/"
    />
    <meta
      property="og:title"
      content="ShopEasy - Online Fashion Store | Shop Latest Trends"
    />
    <meta
      property="og:description"
      content="Discover the latest fashion trends. Shop clothing, accessories, watches, perfumes & more. Free delivery, COD available, easy returns."
    />
    <meta
      property="og:image"
      content="https://shopeasy-fashionstore.netlify.app/og-image.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="ShopEasy" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:url"
      content="https://shopeasy-fashionstore.netlify.app/"
    />
    <meta name="twitter:title" content="ShopEasy - Online Fashion Store" />
    <meta
      name="twitter:description"
      content="Shop the latest trends in fashion. Free delivery, COD available, easy returns."
    />
    <meta
      name="twitter:image"
      content="https://shopeasy-fashionstore.netlify.app/twitter-image.jpg"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="%PUBLIC_URL%/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="%PUBLIC_URL%/favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%PUBLIC_URL%/apple-touch-icon.png"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://shopeasy-fashionstore.netlify.app/" />

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "ShopEasy",
        "url": "https://shopeasy-fashionstore.netlify.app",
        "logo": "https://shopeasy-fashionstore.netlify.app/logo512.png",
        "description": "Online fashion store for clothing, accessories, and lifestyle products",
        "sameAs": [
          "https://www.facebook.com/shopeasy",
          "https://www.instagram.com/shopeasy",
          "https://twitter.com/shopeasy"
        ]
      }
    </script>

    <!-- Structured Data - WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "ShopEasy",
        "url": "https://shopeasy-fashionstore.netlify.app",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://shopeasy-fashionstore.netlify.app/products?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Structured Data - Online Store -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "ShopEasy",
        "image": "https://shopeasy-fashionstore.netlify.app/logo512.png",
        "url": "https://shopeasy-fashionstore.netlify.app",
        "telephone": "+91-1234567890",
        "priceRange": "₹₹",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "IN"
        },
        "paymentAccepted": "Cash, Credit Card, Debit Card, UPI",
        "currenciesAccepted": "INR",
        "openingHours": "Mo-Su 00:00-23:59"
      }
    </script>

    <title>
      ShopEasy - Online Fashion Store | Clothing, Accessories & More
    </title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
