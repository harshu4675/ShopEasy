<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#667eea" />

    <!-- Google Search Console Verification -->

    <meta
      name="google-site-verification"
      content="R7KNlXfy1lZ-dLL03p8Jv81-RkqmXRLv36d0C3TvRJE"
    />

    <!-- SEO Title -->

    <title>
      ShopEasy | Online Fashion Store India – Clothing, Accessories, Watches &
      Perfumes
    </title>

    <!-- Primary SEO -->

    <meta
      name="description"
      content="ShopEasy is an online fashion store in India. Buy men's & women's clothing, accessories, watches, perfumes, bags, jewellery and footwear with free delivery and cash on delivery."
    />

    <meta
      name="keywords"
      content="online fashion store india, buy clothes online india, mens clothing india, womens clothing india, accessories online india, watches perfumes bags footwear india, shopeasy fashion store"
    />

    <meta name="author" content="ShopEasy" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="language" content="English" />

    <!-- GEO SEO -->

    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />

    <!-- Canonical -->

    <link rel="canonical" href="https://shopeasy-fashionstore.netlify.app/" />

    <!-- Favicon -->

    <link rel="icon" href="/logo192.png" />
    <link rel="apple-touch-icon" href="/logo192.png" />

    <!-- Open Graph -->

    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://shopeasy-fashionstore.netlify.app/"
    />
    <meta property="og:title" content="ShopEasy Online Fashion Store" />
    <meta
      property="og:description"
      content="Discover the latest fashion trends. Clothing, accessories, watches and perfumes with free delivery."
    />
    <meta
      property="og:image"
      content="https://shopeasy-fashionstore.netlify.app/logo192.png"
    />
    <meta property="og:site_name" content="ShopEasy" />

    <!-- Twitter -->

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ShopEasy Fashion Store" />
    <meta
      name="twitter:description"
      content="Buy trendy fashion online at ShopEasy."
    />
    <meta
      name="twitter:image"
      content="https://shopeasy-fashionstore.netlify.app/logo192.png"
    />

    <!-- Preconnect -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts -->

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Organization Schema -->

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "ShopEasy",
        "url": "https://shopeasy-fashionstore.netlify.app",
        "logo": "https://shopeasy-fashionstore.netlify.app/logo192.png",
        "sameAs": ["https://github.com/", "https://linkedin.com/"],
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+91-9876543210",
          "contactType": "customer support",
          "email": "harshu6278@gmail.com",
          "areaServed": "IN"
        }
      }
    </script>

    <!-- Website Schema -->

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "ShopEasy",
        "url": "https://shopeasy-fashionstore.netlify.app",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://shopeasy-fashionstore.netlify.app/products?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Ecommerce Store Schema -->

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "ShopEasy Fashion Store",
        "image": "https://shopeasy-fashionstore.netlify.app/logo192.png",
        "url": "https://shopeasy-fashionstore.netlify.app",
        "priceRange": "₹₹",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "India"
        },
        "paymentAccepted": "Cash, Credit Card, Debit Card, UPI, Net Banking",
        "currenciesAccepted": "INR"
      }
    </script>
  </head>

  <body>
    <noscript>
      <div style="padding: 20px; text-align: center; font-family: Arial">
        <h2>JavaScript Required</h2>
        <p>You need to enable JavaScript to run this app.</p>
      </div>
    </noscript>

    <div id="root"></div>
  </body>
</html>
